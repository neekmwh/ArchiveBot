# A generic, single-database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date
# within the migration file as well as the filename.
# string value is passed to dateutil.tz.gettz()
# leave blank for local time
# timezone =

# max length of characters to associate with the
# "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow empty migrations to be created
# if no changes are detected by model-definition comparison
# allow_empty_history = false

# version location specification; This defaults
# to alembic/versions.  When using multiple version
# directories, paths must be separated by spaces,
# e.g. version_locations = %(here)s/bar %(here)s/bat alembic/versions
version_locations = alembic/versions

# the class to use for the output logging format
# of alembic.  Defaults to standard "generic" logging.
# logging_config_class = logging.config.dictConfig

sqlalchemy.url = postgresql+psycopg2://postgres:postgres_password_1020@db:5432/contractor_crm

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
